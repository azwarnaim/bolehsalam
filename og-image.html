<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  /* This page is for generating the OG image screenshot (1200x630) */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #f0fdf4 0%, #fefdf8 40%, #faf3e0 100%);
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    position: relative;
    overflow: hidden;
  }

  /* Background pattern */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 50px, rgba(200,164,92,0.06) 50px, rgba(200,164,92,0.06) 51px),
      repeating-linear-gradient(-45deg, transparent, transparent 50px, rgba(200,164,92,0.06) 50px, rgba(200,164,92,0.06) 51px);
  }

  /* Green accent bar */
  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: linear-gradient(90deg, #166534, #22c55e, #c8a45c);
  }

  .content {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .ketupat {
    width: 100px;
    height: 120px;
    margin: 0 auto 24px;
  }

  .title {
    font-size: 72px;
    font-weight: 800;
    background: linear-gradient(135deg, #166534 0%, #16a34a 50%, #c8a45c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .subtitle {
    font-size: 28px;
    color: #6b7280;
    font-weight: 500;
    margin-bottom: 32px;
  }

  .tags {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .tag {
    background: white;
    border: 2px solid #e5e7eb;
    border-radius: 999px;
    padding: 10px 24px;
    font-size: 18px;
    font-weight: 600;
    color: #1a1a2e;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .tag.green { border-color: #22c55e; color: #166534; }
  .tag.red { border-color: #ef4444; color: #dc2626; }
  .tag.gold { border-color: #c8a45c; color: #a3842a; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="content">
    <div class="ketupat">
      <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100" height="120">
        <path d="M40 18 L68 50 L40 82 L12 50 Z" stroke="url(#g)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M26 34 L54 66" stroke="url(#g)" stroke-width="1.2" opacity="0.35"/>
        <path d="M54 34 L26 66" stroke="url(#g)" stroke-width="1.2" opacity="0.35"/>
        <path d="M40 18 L35 8" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M40 18 L45 8" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M35 8 Q40 5 45 8" stroke="url(#g)" stroke-width="2" stroke-linecap="round" fill="none"/>
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#166534"/>
            <stop offset="100%" stop-color="#c8a45c"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1 class="title">Boleh Salam?</h1>
    <p class="subtitle">Semak hubungan mahram dengan mudah dan pantas</p>
    <div class="tags">
      <span class="tag green">Mahram</span>
      <span class="tag red">Bukan Mahram</span>
      <span class="tag gold">40+ Hubungan</span>
    </div>
  </div>
</body>
</html>
