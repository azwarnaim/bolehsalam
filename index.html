<!DOCTYPE html>
<html lang="ms" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#166534">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Semak sama ada anda boleh bersalam berdasarkan hubungan mahram. Pantas, mudah & percuma.">

  <!-- Open Graph (Facebook, WhatsApp, Telegram, LinkedIn) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bolehsalam.com/">
  <meta property="og:title" content="Boleh Salam? — Semak Hubungan Mahram">
  <meta property="og:description" content="Tak pasti boleh salam ke tak? Semak hubungan mahram dengan mudah dan pantas. 40+ hubungan keluarga diliputi.">
  <meta property="og:image" content="https://bolehsalam.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Boleh Salam? — Semak hubungan mahram dengan mudah">
  <meta property="og:locale" content="ms_MY">
  <meta property="og:locale:alternate" content="en_US">
  <meta property="og:site_name" content="Boleh Salam?">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Boleh Salam? — Semak Hubungan Mahram">
  <meta name="twitter:description" content="Tak pasti boleh salam ke tak? Semak hubungan mahram dengan mudah dan pantas.">
  <meta name="twitter:image" content="https://bolehsalam.com/og-image.png">

  <title>Boleh Salam? — Semak Hubungan Mahram</title>

  <!-- Favicon (ketupat SVG) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 80 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 18 L68 50 L40 82 L12 50 Z' stroke='%23166534' stroke-width='3' stroke-linejoin='round'/%3E%3Cpath d='M26 34 L54 66' stroke='%23c8a45c' stroke-width='1.2' opacity='0.5'/%3E%3Cpath d='M54 34 L26 66' stroke='%23c8a45c' stroke-width='1.2' opacity='0.5'/%3E%3Cpath d='M40 18 L35 8' stroke='%23166534' stroke-width='2.5' stroke-linecap='round'/%3E%3Cpath d='M40 18 L45 8' stroke='%23166534' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="back-btn" id="backBtn" onclick="goBack()" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()" aria-label="Toggle language">EN</button>
    </div>

    <!-- Step 0: Welcome -->
    <section class="step active" id="step-welcome">
      <div class="welcome-content">
        <div class="ketupat-icon" aria-hidden="true">
          <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 18 L68 50 L40 82 L12 50 Z" stroke="url(#kg)" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M26 34 L54 66" stroke="url(#kg)" stroke-width="1" opacity="0.35"/>
            <path d="M54 34 L26 66" stroke="url(#kg)" stroke-width="1" opacity="0.35"/>
            <path d="M40 18 L35 8" stroke="url(#kg)" stroke-width="2" stroke-linecap="round"/>
            <path d="M40 18 L45 8" stroke="url(#kg)" stroke-width="2" stroke-linecap="round"/>
            <path d="M35 8 Q40 5 45 8" stroke="url(#kg)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            <defs>
              <linearGradient id="kg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#166534"/>
                <stop offset="100%" stop-color="#c8a45c"/>
              </linearGradient>
            </defs>
          </svg>
        </div>

        <p class="raya-greeting" data-i18n="rayaGreeting">Selamat Hari Raya Aidilfitri</p>
        <h1 class="title">Boleh Salam<span class="title-q">?</span></h1>
        <p class="subtitle" data-i18n="pickGender">Saya adalah...</p>

        <div class="options-grid">
          <button class="option-card" onclick="selectGender('m')">
            <div class="option-icon-wrap male-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M5 21v-1a7 7 0 0114 0v1"/>
              </svg>
            </div>
            <span class="option-label" data-i18n="male">Lelaki</span>
            <span class="option-desc" data-i18n="maleDesc">Akhwan</span>
          </button>
          <button class="option-card" onclick="selectGender('f')">
            <div class="option-icon-wrap female-icon">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M5 21v-1a7 7 0 0114 0v1"/>
              </svg>
            </div>
            <span class="option-label" data-i18n="female">Perempuan</span>
            <span class="option-desc" data-i18n="femaleDesc">Akhwat</span>
          </button>
        </div>

        <!-- Quick Check Section -->
        <div class="quick-check" id="quickCheck">
          <p class="quick-check-title" data-i18n="quickTitle">Soalan Popular</p>
          <p class="quick-check-note" data-i18n="quickNote">* Antara berlainan jantina</p>
          <div class="quick-cards">
            <button class="quick-card" onclick="quickCheck(this)">
              <span class="quick-q" data-i18n="qCousin">Sepupu</span>
              <span class="quick-a hidden" data-i18n="qCousinA">Bukan mahram</span>
            </button>
            <button class="quick-card" onclick="quickCheck(this)">
              <span class="quick-q" data-i18n="qInlaw">Ipar</span>
              <span class="quick-a hidden" data-i18n="qInlawA">Bukan mahram</span>
            </button>
            <button class="quick-card" onclick="quickCheck(this)">
              <span class="quick-q" data-i18n="qMil">Mertua</span>
              <span class="quick-a boleh hidden" data-i18n="qMilA">Mahram</span>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Family Tree -->
    <section class="step" id="step-tree">
      <div class="step-content">
        <h2 class="step-title" data-i18n="treeTitle">Pokok Keluarga Mahram</h2>
        <p class="tree-subtitle" data-i18n="treeSubtitle">Ketuk pada nama untuk maklumat lanjut</p>

        <div class="tree-sticky">
          <div class="tree-gender-toggle">
            <button class="tree-gender-btn active" data-gender="m" onclick="setTreeGender('m')">
              <span data-i18n="male">Lelaki</span>
            </button>
            <button class="tree-gender-btn" data-gender="f" onclick="setTreeGender('f')">
              <span data-i18n="female">Perempuan</span>
            </button>
          </div>

          <div class="tree-legend">
            <span class="tree-legend-item boleh">
              <span class="tree-legend-dot boleh"></span>
              <span data-i18n="treeBoleh">Boleh Salam</span>
            </span>
            <span class="tree-legend-item tak-boleh">
              <span class="tree-legend-dot tak-boleh"></span>
              <span data-i18n="treeTakBoleh">Tak Boleh Salam</span>
            </span>
            <button class="tree-samegender-toggle" id="sameGenderToggle" onclick="toggleSameGender()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <span data-i18n="treeShowSame">Tunjuk sama jantina</span>
            </button>
          </div>
        </div>

        <div class="tree-container" id="treeContainer"></div>

        <!-- Detail overlay -->
        <div class="tree-detail-overlay" id="treeDetailOverlay" onclick="hideTreeDetail()">
          <div class="tree-detail-sheet" onclick="event.stopPropagation()">
            <div class="tree-detail-badge boleh" id="treeDetailBadge">Boleh Salam</div>
            <h3 class="tree-detail-name" id="treeDetailName"></h3>
            <p class="tree-detail-name-sec" id="treeDetailNameSec"></p>
            <p class="tree-detail-status" id="treeDetailStatus"></p>
            <p class="tree-detail-note" id="treeDetailNote"></p>
            <button class="btn-secondary tree-detail-close" onclick="hideTreeDetail()">
              <span data-i18n="treeClose">Tutup</span>
            </button>
          </div>
        </div>
      </div>
    </section>


  </div>

  <footer class="footer">
    <p data-i18n="footerNote">Untuk keputusan yang lebih tepat, sila rujuk ulama.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
